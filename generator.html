<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <header class="hero small-hero">
    <nav class="navbar">
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="analyzer.html">Analyzer</a></li>
        <li><a href="generator.html">Generator</a></li>
      </ul>
    </nav>

    <div class="hero-content">
      <h2>Password Generator</h2>
      <p>Creates a secure password based on chosen, customizable requirements. </p>
    </div>
  </header>

  <main>
    <section class="generator">
      <p>Choose requirements, then press generate password</p>

      <div class="generator-options">
        <label>
          Length:
          <input type="number" id="length" min="5" value="14" />
        </label><br/>

        <label>
          <input type="checkbox" id="uppercase" checked />
          Include Uppercase Letters
        </label><br/>

        <label>
          <input type="checkbox" id="lowercase" checked />
          Include Lowercase Letters
        </label><br/>

        <label>
          <input type="checkbox" id="numbers" checked />
          Include Numbers
        </label><br/>

        <label>
          <input type="checkbox" id="symbols" checked />
          Include Special Characters
        </label><br/>

        <label>
          At least:
          <input type="number" id="numberOfSpecial" min="0" value="2" class="InputBox"/> special characters
        </label><br/>

        <label>
          <input type="checkbox" id="repeatable" checked/>
          Repeatable Characters
        </label><br/>
      </div>

      <br/>

      <button onclick="generatePassword()">Generate Password</button>

      <div class="generated-password">
        <input
          type="text"
          id="generatedPassword"
          readonly
          placeholder="Generated password will appear here"
          editable="false"
        />
      </div>
    </section>
  </main>

  <footer>
    <p>CS 331 Spring 2026</p>
    <p>Group 2: Mason Beckman, Youssef Ebed, Gavin Copple, Cameron Kadre, Grant Koupal, Jay Rudel</p>
  </footer>

  <script src="script.js"></script>
  <script src="generator.js"></script>

</body>
</html>
